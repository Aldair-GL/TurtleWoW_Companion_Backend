services:
  - type: web
    name: turtlewow-companion-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8084"
      - key: DATABASE_URL
        fromDatabase:
          name: neondb
          property: connectionString
      - key: SPRING_PROFILES_ACTIVE
        value: prod

